   <script>
   document.getElementById("logoutBtn").addEventListener("click", function(e) {
    e.preventDefault(); // stop page reload

    fetch('/logout/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        }
    })
    .then(res => res.json())
    .then(data => {
        if (data.status) {
            window.location.href = '/login/';
        } else {
            alert("Logout failed");
        }
    })
    .catch(err => {
        console.error(err);
    });
});



</script>
