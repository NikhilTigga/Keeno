{% include 'header.html' %}
{% include 'navbar.html' %}
{% include 'sidebar.html' %}
{% load static %}

  <!-- Content Wrapper. Contains page content -->
  <div class="content-wrapper "  style="background-image:url('{% static '../static/dist/img/SriKrishnabackgroundimage3.jpg'   %}');background-size:cover;">
    <!-- Content Header (Page header) -->
    <div class="content-header  ">
      <div class="container-fluid bg-white p-2 rounded ">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1 class="m-0">Dashboard</h1>
          </div><!-- /.col -->
          <div class="col-sm-6">
            <ol class="breadcrumb float-sm-right">
              <li class="breadcrumb-item"><a href="#">Home</a></li>
              <li class="breadcrumb-item active">Dashboard</li>
            </ol>
          </div><!-- /.col -->
        </div><hr><!-- /.row -->
      </div><!-- /.container-fluid -->
    </div>
    <div class="row ml-2 mr-2">
      <div class="col-xl-3 col-md-6 mb-4">
          <div class="card_ border-left-primary shadow h-100 py-2  bg-white">
              <div class="card-body">
                  <div class="row no-gutters align-items-center">
                      <div class="col mr-2">
                          <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Total Users</div>
                          <div class="h5 mb-0 font-weight-bold text-gray-800">125</div>
                      </div>
                      <div class="col-auto">
                          <i class="fas fa-users fa-2x text-gray-300"></i>
                      </div>
                  </div>
              </div>
          </div>
      </div>

      <div class="col-xl-3 col-md-6 mb-4">
          <div class="card_ border-left-success shadow h-100 py-2  bg-white">
              <div class="card-body">
                  <div class="row no-gutters align-items-center">
                      <div class="col mr-2">
                          <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Total Vendors</div>
                          <div class="h5 mb-0 font-weight-bold text-gray-800">880</div>
                      </div>
                      <div class="col-auto">
                          <i class="fas fa-boxes fa-2x text-gray-300"></i>
                      </div>
                  </div>
              </div>
          </div>
      </div>

      <div class="col-xl-3 col-md-6 mb-4">
          <div class="card_ border-left-info shadow h-100 py-2  bg-white">
              <div class="card-body">
                  <div class="row no-gutters align-items-center">
                      <div class="col mr-2">
                          <div class="text-xs font-weight-bold text-info text-uppercase mb-1">Total Delivery Partner</div>
                          <div class="h5 mb-0 font-weight-bold text-gray-800">40</div>
                      </div>
                      <div class="col-auto">
                          <i class="fas fa-handshake fa-2x text-gray-300"></i>
                      </div>
                  </div>
              </div>
          </div>
      </div>

      <div class="col-xl-3 col-md-6 mb-4">
          <div class="card_ border-left-warning shadow h-100 py-2  bg-white">
              <div class="card-body">
                  <div class="row no-gutters align-items-center">
                      <div class="col mr-2">
                          <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">Total Revenue</div>
                          <div class="h5 mb-0 font-weight-bold text-gray-800" id="totalRevenue"></div>
                      </div>
                      <div class="col-auto">
                          <i class="fas fa-rupee-sign fa-2x text-gray-300"></i>
                      </div>
                  </div>
              </div>
          </div>
      </div>
    </div>

    
  </div>

  <script>
document.addEventListener("DOMContentLoaded", function () {

    // Function to fetch dashboard totals
    function loadDashboardTotals() {
        fetch("{% url 'calculateTotalDashboard' %}")
            .then(response => response.json())
            .then(data => {
                if (data.status) {
                    // Update cards
                    document.querySelector(".card_ .text-gray-800:nth-child(2)").textContent = data.data.total_users;
                    document.querySelectorAll(".card_ .text-gray-800")[1].textContent = data.data.total_vendors;
                    document.querySelectorAll(".card_ .text-gray-800")[2].textContent = data.data.total_deliveryPatners;
                    // Total Revenue card - you can calculate if needed
                    document.getElementById("totalRevenue").textContent="₹ "+(data.data.total_comission || 0);
                } else {
                    console.error("Failed to load totals:", data.message);
                }
            })
            .catch(err => console.error("Error fetching totals:", err));
    }

    // Call the function on page load
    loadDashboardTotals();

});
</script>
